<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <meta name="robots" content="noindex" />
        <title>{{status_code}} {{title}}</title>
        <style>
            :root {
                --bg: #f5f5f5;
                --text: #111;
                --surface: #e2e2e2;
                --muted: #777;
                --link: #555;
                --accent: {{ACCENT_COLOR}};
            }
            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: #0a0a0a;
                    --text: #e0e0e0;
                    --surface: #1a1a1a;
                    --muted: #555;
                    --link: #777;
                }
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: system-ui, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background: var(--bg);
                color: var(--text);
            }
            .box {
                max-width: 480px;
                width: 100%;
                padding: 2rem;
            }
            h1 {
                font-size: 4rem;
                font-weight: 700;
                color: var(--accent);
                line-height: 1;
                margin-bottom: 0.5rem;
            }
            h2 {
                font-size: 1.25rem;
                font-weight: 500;
                margin-bottom: 1rem;
            }
            p {
                color: var(--muted);
                line-height: 1.5;
            }
        </style>
    </head>
    <body>
        <div class="box">
            <h1>{{status_code}}</h1>
            <h2>{{title}}</h2>
            <p>{{description}}</p>
        </div>
    </body>
</html>
