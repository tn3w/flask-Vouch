<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <meta name="robots" content="noindex" />
        <title>Verify</title>
        <style>
            :root {
                --bg: #f5f5f5;
                --text: #111;
                --surface: #e2e2e2;
                --border: #bbb;
                --muted: #777;
                --link: #555;
                --error: #c00;
                --accent: {{ACCENT_COLOR}};
            }
            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: #0a0a0a;
                    --text: #e0e0e0;
                    --surface: #1a1a1a;
                    --border: #333;
                    --muted: #555;
                    --link: #777;
                    --error: #f55;
                }
            }
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body {
                font-family: system-ui, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                background: var(--bg);
                color: var(--text);
            }
            .box {
                max-width: 560px;
                width: 100%;
                padding: 2rem;
            }
            h2 {
                text-align: center;
                font-weight: 500;
                font-size: 1.05rem;
                margin-bottom: 1.4rem;
            }
            .panels {
                display: flex;
                gap: 1rem;
                margin-bottom: 1.2rem;
            }
            .panel {
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 0.4rem;
            }
            .panel-label {
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: var(--muted);
                text-align: center;
            }
            .frame {
                position: relative;
                width: 100%;
                aspect-ratio: 1;
                border-radius: 8px;
                border: 2px solid var(--border);
                overflow: hidden;
                background: var(--surface);
            }
            .frame img {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
            .sheet-frame {
                position: absolute;
                inset: 0;
                overflow: hidden;
            }
            .sheet-frame img {
                position: absolute;
                top: 0;
                left: 0;
                height: 100%;
                width: auto;
                transition: opacity 0.25s ease;
            }
            .sheet-frame img.hidden { opacity: 0; }
            .sheet-frame img.visible { opacity: 1; }
            .nav {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.75rem;
            }
            .nav button {
                width: 34px;
                height: 34px;
                border-radius: 50%;
                border: 1px solid var(--border);
                background: var(--surface);
                color: var(--text);
                font-size: 1rem;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }
            .nav button:hover { background: var(--border); }
            .counter {
                font-size: 0.85rem;
                color: var(--muted);
                min-width: 3rem;
                text-align: center;
            }
            .error {
                color: var(--error);
                font-size: 0.85rem;
                margin-bottom: 0.8rem;
                text-align: center;
            }
            .actions {
                display: flex;
                gap: 0.6rem;
            }
            button[type="submit"] {
                flex: 1;
                padding: 0.6rem;
                background: var(--accent);
                color: #111;
                border: none;
                border-radius: 4px;
                font-size: 1rem;
                font-weight: 600;
                cursor: pointer;
            }
            button[type="submit"]:hover { filter: brightness(0.85); }
            .reload-btn {
                padding: 0.6rem 0.9rem;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 4px;
                font-size: 0.9rem;
                color: var(--text);
                text-decoration: none;
                cursor: pointer;
                white-space: nowrap;
            }
            .reload-btn:hover { background: var(--border); }
            .branding {
                margin-top: 1.2rem;
                font-size: 0.7rem;
                color: var(--muted);
                text-align: center;
            }
            .branding a { color: var(--link); text-decoration: none; }
            .branding a:hover { text-decoration: underline; }
        </style>
    </head>
    <body>
        <div class="box">
            <h2>Select the matching orientation</h2>

            {{ERROR}}

            <form method="POST" action="{{verifyPath}}" id="captcha-form">
                <input type="hidden" name="id" value="{{id}}" />
                <input type="hidden" name="redirect" value="{{redirect}}" />
                <input type="hidden" name="csrf_token" value="{{csrfToken}}" />
                <input type="hidden" name="nonce" id="nonce" value="0" />

                <div class="panels">
                    <div class="panel">
                        <span class="panel-label">Reference</span>
                        <div class="frame">
                            <img
                                src="data:image/webp;base64,{{reference}}"
                                alt="Reference orientation"
                            />
                        </div>
                    </div>

                    <div class="panel">
                        <span class="panel-label">Your choice</span>
                        <div class="frame">
                            <div class="sheet-frame" id="sheet-wrap">
                                <img
                                    id="sheet-a"
                                    src="data:image/webp;base64,{{sheet}}"
                                    alt="Choice A"
                                    class="visible"
                                />
                                <img
                                    id="sheet-b"
                                    src="data:image/webp;base64,{{sheet}}"
                                    alt="Choice B"
                                    class="hidden"
                                />
                            </div>
                        </div>
                        <div class="nav">
                            <button type="button" id="prev-btn">&#9664;</button>
                            <span class="counter" id="counter">1 / {{choiceCount}}</span>
                            <button type="button" id="next-btn">&#9654;</button>
                        </div>
                    </div>
                </div>

                <div class="actions">
                    <a class="reload-btn" href="{{redirect}}">New</a>
                    <button type="submit">Verify</button>
                </div>
            </form>

            {{BRANDING}}
        </div>
        <script>
            (function () {
                var total = parseInt('{{choiceCount}}', 10);
                var current = 0;
                var transitioning = false;

                var imgA = document.getElementById('sheet-a');
                var imgB = document.getElementById('sheet-b');
                var counter = document.getElementById('counter');
                var nonceInput = document.getElementById('nonce');

                function frameOffset(idx) {
                    return -((idx * 100) / total) + '%';
                }

                function applyFrame(img, idx) {
                    img.style.width = total * 100 + '%';
                    img.style.transform = 'translateX(' + frameOffset(idx) + ')';
                }

                applyFrame(imgA, 0);
                applyFrame(imgB, 0);

                function goTo(idx) {
                    if (transitioning) return;
                    transitioning = true;
                    current = ((idx % total) + total) % total;
                    nonceInput.value = current;
                    counter.textContent = current + 1 + ' / ' + total;

                    var front = imgA.classList.contains('visible') ? imgA : imgB;
                    var back = front === imgA ? imgB : imgA;

                    applyFrame(back, current);
                    back.classList.remove('hidden');
                    back.classList.add('visible');
                    front.classList.remove('visible');
                    front.classList.add('hidden');

                    setTimeout(function () {
                        transitioning = false;
                    }, 270);
                }

                document.getElementById('prev-btn').addEventListener('click', function () {
                    goTo(current - 1);
                });
                document.getElementById('next-btn').addEventListener('click', function () {
                    goTo(current + 1);
                });
            })();
        </script>
    </body>
</html>
