<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <meta name="robots" content="noindex" />
        <title>Verify</title>
        <style>
            :root {
                --bg: #f5f5f5;
                --text: #111;
                --surface: #e2e2e2;
                --border: #bbb;
                --muted: #777;
                --link: #555;
                --error: #c00;
                --accent: {{ACCENT_COLOR}};
            }
            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: #0a0a0a;
                    --text: #e0e0e0;
                    --surface: #1a1a1a;
                    --border: #333;
                    --muted: #555;
                    --link: #777;
                    --error: #f55;
                }
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: system-ui, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background: var(--bg);
                color: var(--text);
            }
            .box {
                text-align: center;
                max-width: 480px;
                width: 100%;
                padding: 2rem;
            }
            h2 {
                margin-bottom: 1.2rem;
                font-weight: 500;
            }
            .audio-wrap {
                margin: 0 auto 1.2rem;
            }
            audio {
                width: 100%;
                max-width: 360px;
            }
            input[type="text"] {
                width: 100%;
                padding: 0.6rem 0.8rem;
                font-size: 1.1rem;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                background: var(--surface);
                color: var(--text);
                border: 1px solid var(--border);
                border-radius: 4px;
                outline: none;
                margin-bottom: 0.8rem;
            }
            input[type="text"]:focus {
                border-color: var(--accent);
            }
            button[type="submit"] {
                width: 100%;
                padding: 0.6rem;
                background: var(--accent);
                color: #111;
                border: none;
                border-radius: 4px;
                font-size: 1rem;
                font-weight: 600;
                cursor: pointer;
            }
            button[type="submit"]:hover {
                filter: brightness(0.85);
            }
            .branding {
                margin-top: 1.5rem;
                font-size: 0.7rem;
                color: var(--muted);
            }
            .branding a {
                color: var(--link);
                text-decoration: none;
            }
            .branding a:hover {
                text-decoration: underline;
            }
            .error {
                color: var(--error);
                font-size: 0.85rem;
                margin-bottom: 0.8rem;
            }
            .reload-btn {
                display: inline-block;
                margin-bottom: 0.8rem;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 4px;
                padding: 0.3rem 0.8rem;
                font-size: 0.85rem;
                color: var(--text);
                text-decoration: none;
                cursor: pointer;
            }
            .reload-btn:hover {
                background: var(--border);
            }
        </style>
    </head>
    <body>
        <div class="box">
            <h2>Type the characters you hear</h2>
            <div class="audio-wrap">
                <audio controls autoplay src="{{audio}}">
                    Your browser does not support audio.
                </audio>
            </div>
            <a class="reload-btn" href="{{redirect}}">New challenge</a>
            {{ERROR}}
            <form method="POST" action="{{verifyPath}}">
                <input type="hidden" name="id" value="{{id}}" />
                <input type="hidden" name="redirect" value="{{redirect}}" />
                <input type="hidden" name="csrf_token" value="{{csrfToken}}" />
                <input
                    type="text"
                    name="nonce"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="characters"
                    spellcheck="false"
                    autofocus
                    placeholder="Enter characters you hear"
                />
                <button type="submit">Verify</button>
            </form>
            {{BRANDING}}
        </div>
    </body>
</html>
